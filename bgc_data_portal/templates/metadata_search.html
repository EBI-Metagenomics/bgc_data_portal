<!-- templates/metadata_search.html -->
{% extends 'base.html' %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Search</title>
    <style>
        .pagination {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .pagination a {
            margin: 0 5px;
            padding: 5px 10px;
            border: 1px solid #ccc;
            text-decoration: none;
        }
        .pagination .active {
            background-color: #007bff;
            color: white;
            border: 1px solid #007bff;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Metadata Search</h1>
    <form id="search-form">
        {{ form.as_p }}
        <button type="submit">Search</button>
    </form>

    <div id="results">
        <p>Enter MGYC value to search for metadata.</p>
    </div>

    <script>
        $(document).ready(function() {
            // Handle form submission
            $('#search-form').on('submit', function(e) {
                e.preventDefault();
                loadResults(1);  // Load the first page of results
            });

            // Handle pagination
            $(document).on('click', '.pagination a', function(e) {
                e.preventDefault();
                var page = $(this).data('page');
                loadResults(page);
            });

            function loadResults(page) {
                $.ajax({
                    url: "{% url 'metadata_search' %}",
                    type: "GET",
                    data: {
                        mgyc_value: $('#id_mgyc_value').val(),
                        page: page,
                    },
                    success: function(response) {
                        $('#results').html(response);
                    },
                    error: function() {
                        $('#results').html('<p>An error occurred. Please try again.</p>');
                    }
                });
            }
        });
    </script>
</body>
</html>
{% endblock content %}
