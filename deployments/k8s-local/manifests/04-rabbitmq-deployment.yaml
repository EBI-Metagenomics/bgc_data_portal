apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: bgc-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          # management variant gives you a UI at http://localhost:15672 (guest/guest)
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672   # AMQP
            - containerPort: 15672  # management UI
          readinessProbe:
            exec:
              command: [rabbitmq-diagnostics, -q, ping]
            initialDelaySeconds: 10
            periodSeconds: 10
