apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: bgc-local
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          # ankane/pgvector is multi-arch (amd64 + arm64) — works on Mac M3
          image: ankane/pgvector:latest
          envFrom:
            - secretRef:
                name: bgc-data-portal-secret
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes: [ReadWriteOnce]
        # kind uses local-path-provisioner by default — no storageClassName needed
        resources:
          requests:
            storage: 5Gi
